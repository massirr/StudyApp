name: Agent Management
on:
  pull_request:
    types: [labeled]
    branches: [main]

jobs:
  agent:
    if: contains(github.event.pull_request.labels.*.name, 'spec-approved')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - name: Run Spec Validator
        run: node scripts/agent/validate-spec.js
      - name: Run Task Generator
        run: node scripts/agent/generate-tasks.js
      - name: Run Plan Creator
        run: node scripts/agent/create-plan.js
